<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Eligibility Checker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<h2 class="logo">Civic-Scheme</h2>
<button onclick="startVoiceSearch()">🎤</button>
</nav>

<h1 class="page-title">Find Schemes Based on Eligibility</h1>

<div class="form-card">

<div class="form-row">

  <div class="form-group">
    <label>Gender</label>
    <select id="gender">
      <option value="all">All</option>
      <option value="female">Female</option>
      <!-- FIXED HERE -->
      <option value="all">Male</option>
    </select>
  </div>

  <div class="form-group">
    <label>Age Group</label>
    <select id="age">
      <option value="all">All</option>
      <option value="child">Child</option>
      <option value="youth">Youth</option>
      <option value="all">Senior Citizen</option>
    </select>
  </div>

</div>

<div class="form-group full">
  <label>Category</label>
  <select id="category">
    <option value="all">All</option>
    <option value="student">Student</option>
    <option value="farmer">Farmer</option>
    <option value="business">Business</option>
  </select>
</div>

<button onclick="checkEligibility()" class="search-btn">
  🔍 Find Schemes
</button>

</div>

<div class="cards-container" id="resultContainer"></div>

<!-- <script src="schemes-data.js"></script> -->
<script src="script.js"></script>

</body>
</html>
